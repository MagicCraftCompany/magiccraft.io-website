    <style>
      /* Critical: prevent FOUC on hero */
      html {
        background: #03082f;
        --magicads-top-banner-height: 36px;
      }
      body {
        margin: 0;
        background: #03082f;
        color: #fff;
        font-family: 'Outfit', 'Space Grotesk', system-ui, sans-serif;
      }
      #root {
        min-height: 100dvh;
      }
      /* Show loading state while JS hydrates */

        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
      }
    </style>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>MagicCraft | Live Game &amp; AI Product Studio</title>

    <!-- Google Translate (deferred until after first paint) -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages:
              'en,es,pt,fr,de,ru,zh-CN,ja,ko,ar,hi,tr,vi,th,id',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element'
        )
      }
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script')
          s.src =
            '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit'
          s.async = true
          document.head.appendChild(s)
        }, 1500)
      })
    </script>
    <style>
      /* Hide Google Translate UI (keep the widget alive for programmatic language switching) */
      .goog-te-banner-frame,
      .goog-te-balloon-frame,
      .goog-te-gadget,
      .goog-te-gadget-simple,
      .goog-te-menu-value,
      .goog-te-gadget-icon,
      .goog-te-menu-frame,
      .goog-te-menu2,
      .goog-te-menu2 * {
        display: none !important;
      }
      body {
        top: 0 !important;
      }
      #google_translate_element {
        position: fixed;
        left: -9999px;
        top: 0;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
    </style>

      async
      src="https://www.googletagmanager.com/gtag/js?id=G-93QH3H3B7L"
    ></script>

      window.dataLayer = window.dataLayer || []

  </head>
  <body>
    <!-- Netlify form stub to ensure the SPA form is detected at build time -->
    <form
      name="grants"
      netlify
      netlify-honeypot="bot-field"
      hidden
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="grants" />
      <input
        type="hidden"
        name="subject"
        value="New MagicCraft Grants submission"
      />
      <input type="text" name="teamName" />
      <input type="email" name="email" />
      <input type="text" name="projectName" />
      <input type="url" name="url" />
      <input type="text" name="category" />
      <input type="number" name="amountUsd" />
      <input type="number" name="amountMcrt" />
      <input type="text" name="mcrtPlan" />
      <input type="text" name="wallet" />
      <textarea name="description"></textarea>
      <textarea name="links"></textarea>
      <input type="checkbox" name="hasBuild" />
      <input type="text" name="bot-field" />
    </form>
    <!-- Success page for Netlify redirect after submission -->
    <form name="grants-success" hidden aria-hidden="true">
      <p aria-hidden="true">Thank you for your submission.</p>
    </form>
    <!-- MagicAds (deferred until after first paint to protect LCP) -->
    <script>
      window.MagicAdsConfig = { publisherId: 'pub_magiccraft', theme: 'dark' }
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script')
          s.src = 'https://magicads.dev/v1/magic.js'
          s.async = true
          document.body.appendChild(s)
        }, 2000)
      })
    </script>
    <div
      class="magicads"
      data-placement="top-banner"
      data-size="728x90"
      style="
        display: block;
        width: 100%;
        height: var(--magicads-top-banner-height, 36px);
        min-height: var(--magicads-top-banner-height, 36px);
        overflow: hidden;
        background: #050824;
      "
    ></div>
    <script>
      ;(function labelMagicAdsFrame() {
        var slot = document.querySelector('.magicads')
        if (!slot || typeof MutationObserver === 'undefined') return

        function labelFrames() {
          slot.querySelectorAll('iframe').forEach(function (frame) {
            if (!frame.title) frame.title = 'Sponsored content from MagicAds'
          })
        }

        new MutationObserver(labelFrames).observe(slot, {
          childList: true,
          subtree: true,
        })
        labelFrames()
      })()
    </script>
    <div id="google_translate_element"></div>
    <noscript>
      <main
        class="app-loading"
        style="padding: 2rem; text-align: center; box-sizing: border-box"

          <p data-static-page-description>
            Play the live MagicCraft game and explore the studio's focused AI
            products, optional Web3 functions, and builder systems.
          </p>
        </div>
      </main>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
