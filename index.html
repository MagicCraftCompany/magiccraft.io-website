<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />

    <link rel="icon" href="/favicon.ico" />
    <link
      rel="apple-touch-icon"
      href="https://res.cloudinary.com/dfzcr2ch4/image/upload/f_auto,q_auto,w_180,h_180,c_fill/v1717331155/mcrt-icon_oewidv.webp"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#03082f" />
    <meta name="color-scheme" content="dark light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="MagicCraft" />
    <meta
      name="description"
      content="MagicCraft is a Web3 gaming and AI ecosystem powered by $MCRT: PvP crypto lobbies, NFT-linked characters, marketplace utility, MCRTPay, MagicAds, and creator tools for PC, iOS, Android, and Steam."
    />
    <meta
      name="keywords"
      content="crypto gaming, $MCRT, MagicCraft, PvP lobbies, MOBA, NFT heroes, play and earn, blockchain game, web3, MCRTPay, MagicAds, Bybit, BNB Chain, Steam, iOS, Android"
    />

    <!-- Canonical & Robots -->
    <link rel="canonical" href="https://magiccraft.io/" />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MagicCraft" />
    <meta
      property="og:title"
      content="MagicCraft - $MCRT Game and AI Economy"
    />
    <meta
      property="og:description"
      content="Explore how $MCRT powers PvP lobbies, NFT assets, MCRTPay checkout, MagicAds, AI products, and creator tools across the MagicCraft ecosystem."
    />
    <meta property="og:url" content="https://magiccraft.io/" />
    <meta
      property="og:image"
      content="https://res.cloudinary.com/dfzcr2ch4/image/upload/v1717331155/mcrt-icon_oewidv.webp"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MagicCraft - $MCRT Game and AI Economy"
    />
    <meta
      name="twitter:description"
      content="Explore how $MCRT powers PvP lobbies, NFT assets, MCRTPay checkout, MagicAds, AI products, and creator tools across the MagicCraft ecosystem."
    />
    <meta
      name="twitter:image"
      content="https://res.cloudinary.com/dfzcr2ch4/image/upload/v1717331155/mcrt-icon_oewidv.webp"
    />

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- DNS prefetch for performance -->
    <link rel="dns-prefetch" href="//res.cloudinary.com" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Preload hero media -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dfzcr2ch4/video/upload/so_1/f_jpg,q_auto,w_1920/v1717166775/video_gokp2f.jpg"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="video"
      href="https://res.cloudinary.com/dfzcr2ch4/video/upload/v1717166775/video_gokp2f.mp4"
      type="video/mp4"
    />
    <!-- Preload MagicCraft logo wordmark -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dfzcr2ch4/image/upload/f_auto,q_auto/v1717173072/MagicCraft_1_txz7ga.webp"
      fetchpriority="high"
    />

    <style>
      /* Critical: prevent FOUC on hero */
      html {
        background: #03082f;
      }
      body {
        margin: 0;
        background: #03082f;
        color: #fff;
        font-family: 'Outfit', 'Space Grotesk', system-ui, sans-serif;
      }
      #root {
        min-height: 100dvh;
      }
      /* Show loading state while JS hydrates */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
      }
    </style>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>MagicCraft - $MCRT Game and AI Economy</title>

    <!-- Google Translate (deferred until after first paint) -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages:
              'en,es,pt,fr,de,ru,zh-CN,ja,ko,ar,hi,tr,vi,th,id',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element'
        )
      }
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script')
          s.src =
            '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit'
          s.async = true
          document.head.appendChild(s)
        }, 1500)
      })
    </script>
    <style>
      /* Hide Google Translate UI (keep the widget alive for programmatic language switching) */
      .goog-te-banner-frame,
      .goog-te-balloon-frame,
      .goog-te-gadget,
      .goog-te-gadget-simple,
      .goog-te-menu-value,
      .goog-te-gadget-icon,
      .goog-te-menu-frame,
      .goog-te-menu2,
      .goog-te-menu2 * {
        display: none !important;
      }
      body {
        top: 0 !important;
      }
      #google_translate_element {
        position: fixed;
        left: -9999px;
        top: 0;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
    </style>

    <!-- Structured Data: Organization & WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MagicCraft",
        "url": "https://magiccraft.io/",
        "logo": "https://res.cloudinary.com/dfzcr2ch4/image/upload/v1717331155/mcrt-icon_oewidv.webp",
        "description": "MagicCraft is a crypto gaming MOBA where you battle, build games like Roblox, and earn $MCRT. Play on PC, iOS, Android, and Steam.",
        "sameAs": [
          "https://x.com/MagicCraftGame",
          "https://discord.gg/magiccraftgame",
          "https://t.me/magiccraftgamechat",
          "https://www.youtube.com/@MagicCraftGame"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MagicCraft",
        "url": "https://magiccraft.io/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://magiccraft.io/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-93QH3H3B7L"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || []
      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())

      gtag('config', 'G-93QH3H3B7L')
    </script>
  </head>
  <body>
    <!-- Netlify form stub to ensure the SPA form is detected at build time -->
    <form
      name="grants"
      netlify
      netlify-honeypot="bot-field"
      hidden
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="grants" />
      <input
        type="hidden"
        name="subject"
        value="New MagicCraft Grants submission"
      />
      <input type="text" name="teamName" />
      <input type="email" name="email" />
      <input type="text" name="projectName" />
      <input type="url" name="url" />
      <input type="text" name="category" />
      <input type="number" name="amountUsd" />
      <input type="number" name="amountMcrt" />
      <input type="text" name="mcrtPlan" />
      <input type="text" name="wallet" />
      <textarea name="description"></textarea>
      <textarea name="links"></textarea>
      <input type="checkbox" name="hasBuild" />
      <input type="text" name="bot-field" />
    </form>
    <!-- Success page for Netlify redirect after submission -->
    <form name="grants-success" hidden aria-hidden="true">
      <p aria-hidden="true">Thank you for your submission.</p>
    </form>
    <!-- MagicAds (deferred until after first paint to protect LCP) -->
    <script>
      window.MagicAdsConfig = { publisherId: 'pub_magiccraft', theme: 'dark' }
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.createElement('script')
          s.src = 'https://merlintheai.com/v1/ads.js'
          s.async = true
          document.body.appendChild(s)
        }, 2000)
      })
    </script>
    <div style="display: flex; justify-content: center; min-height: 0">
      <div
        class="magicads"
        data-placement="top-banner"
        data-size="728x90"
      ></div>
    </div>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
